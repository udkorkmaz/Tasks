<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TasX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEECEA;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --text:#1A1917;--text2:#6B6860;--text3:#A8A49E;
    --blue:#2563EB;--blue-glow:rgba(37,99,235,0.18);
    --green:#16A34A;--green-bg:#DCFCE7;
    --red:#DC2626;--red-bg:#FEE2E2;
    --shadow:0 8px 32px rgba(0,0,0,0.10);
    --shadow-drag:0 16px 48px rgba(0,0,0,0.18);
    --radius:14px;--radius-sm:8px;
    --transition:0.2s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg:#111110;--surface:#1C1B19;--surface2:#252420;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#F0EDE8;--text2:#8C8880;--text3:#575450;
    --blue:#60A5FA;--blue-glow:rgba(96,165,250,0.2);
    --green:#4ADE80;--green-bg:rgba(74,222,128,0.12);
    --red:#F87171;--red-bg:rgba(248,113,113,0.12);
    --shadow:0 8px 32px rgba(0,0,0,0.4);
    --shadow-drag:0 16px 48px rgba(0,0,0,0.6);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);transition:background var(--transition),color var(--transition)}

  .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  .header{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
  .header-left h1{font-size:26px;font-weight:600;letter-spacing:-0.5px}
  .header-left p{font-size:13px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
  .header-right{display:flex;gap:8px;align-items:center}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background var(--transition);flex-shrink:0}
  .icon-btn:active{transform:scale(0.92)}

  .tabs{display:flex;gap:6px;padding:16px 20px 0}
  .tab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all var(--transition)}
  .tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .tab .count{margin-left:5px;font-size:11px;opacity:0.6;font-family:'DM Mono',monospace}

  .add-row{display:flex;gap:8px;padding:14px 20px 0}
  .add-row input{flex:1;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;transition:border var(--transition),background var(--transition)}
  .add-row input::placeholder{color:var(--text3)}
  .add-row input:focus{border-color:var(--blue)}
  .add-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:10px 18px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
  .add-btn:active{opacity:0.75}

  .list{flex:1;padding:10px 20px 40px;overflow-y:auto}

  .item-wrap{margin-bottom:8px;position:relative;overflow:hidden;border-radius:var(--radius)}

  .hint-bg{position:absolute;inset:0;border-radius:var(--radius);display:flex;align-items:center;padding:0 22px;pointer-events:none;opacity:0}
  .hint-done{background:var(--green);justify-content:flex-start}
  .hint-cancel{background:var(--red);justify-content:flex-end}
  .hint-restore{background:var(--blue);justify-content:flex-end}
  .hint-icon{font-size:22px;color:#fff;font-weight:600}

  .item{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:10px;transition:border var(--transition),background var(--transition)}
  .item.dragging-item{opacity:0.2;border-style:dashed}
  .item.ghost-item{position:fixed;pointer-events:none;z-index:999;box-shadow:var(--shadow-drag);border-radius:var(--radius);background:var(--surface);border:2px solid var(--blue)}

  .drop-before::before{content:'';display:block;height:3px;background:var(--blue);border-radius:2px;margin-bottom:7px;box-shadow:0 0 10px var(--blue-glow)}
  .drop-after::after{content:'';display:block;height:3px;background:var(--blue);border-radius:2px;margin-top:7px;box-shadow:0 0 10px var(--blue-glow)}

  .drag-handle{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3.5px;width:18px;height:22px;cursor:grab;flex-shrink:0;touch-action:none;opacity:0.22}
  .drag-handle span{display:block;width:12px;height:1.5px;background:var(--text);border-radius:1px}

  .check-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all var(--transition)}
  .check-circle.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
  .check-circle.cancelled{border-color:var(--red);background:var(--red-bg);color:var(--red)}

  .item-body{flex:1;min-width:0}
  .item-text{font-size:14px;line-height:1.45;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;outline:none;border-radius:4px}
  .item-text.crossed{color:var(--text3);text-decoration:line-through}
  .item-text[contenteditable="true"]{white-space:normal;background:var(--surface2);padding:2px 6px;border-radius:4px;border:1px solid var(--blue);color:var(--text);cursor:text}
  .item-date{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}

  .del-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0;opacity:0.45;transition:opacity 0.15s,background 0.15s,color 0.15s}
  .del-btn:active{background:var(--red-bg);color:var(--red);opacity:1}

  .empty{text-align:center;padding:56px 0;color:var(--text3);font-size:14px}
  .restore-hint{text-align:center;padding:8px 0 0;font-size:12px;color:var(--text3)}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;max-width:430px;transform:translateY(30px);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal h2{font-size:18px;font-weight:600;margin-bottom:6px}
  .modal p{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
  .modal-btns{display:flex;flex-direction:column;gap:10px}
  .modal-btns button{padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none}
  .modal-btns button:active{opacity:0.75}
  .btn-danger{background:var(--red);color:#fff}
  .btn-neutral{background:var(--surface2);color:var(--text)}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:13px;font-weight:500;padding:9px 18px;border-radius:20px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:9999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>TasX</h1>
      <p id="subtitle">0 aktif görev</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="reset-btn" title="Sıfırla">🔄</button>
      <button class="icon-btn" id="theme-btn" title="Tema">☀️</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="active">Aktif <span class="count" id="cnt-active">0</span></div>
    <div class="tab" data-tab="done">Tamamlanan <span class="count" id="cnt-done">0</span></div>
    <div class="tab" data-tab="cancelled">İptal <span class="count" id="cnt-cancelled">0</span></div>
  </div>

  <div class="add-row">
    <input type="text" id="new-task" placeholder="Yeni görev..." maxlength="120"/>
    <button class="add-btn" id="add-btn">Ekle</button>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Sıfırla</h2>
    <p>Tamamlanan ve iptal edilen tüm görevler aktife taşınacak.</p>
    <div class="modal-btns">
      <button class="btn-neutral" id="modal-confirm">Tümünü Aktife Al</button>
      <button class="btn-neutral" id="modal-cancel">Vazgeç</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TASKS_KEY='gvlr_v8';
let tasks=[], currentTab='active';
let audioCtx=null;

function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playDone(){
  try{const ctx=getCtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type='sine';
  o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);
  g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  o.start(t);o.stop(t+0.5);}catch(e){}
}
function playCancel(){
  try{const ctx=getCtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type='sine';
  o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(330,t+0.1);o.frequency.setValueAtTime(220,t+0.22);
  g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o.start(t);o.stop(t+0.45);}catch(e){}
}
function playRestore(){
  try{const ctx=getCtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type='sine';
  o.frequency.setValueAtTime(392,t);o.frequency.setValueAtTime(523,t+0.12);
  g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.start(t);o.stop(t+0.35);}catch(e){}
}

let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

let dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
try{const s=localStorage.getItem('gvlr_theme');if(s)dark=s==='dark';}catch(e){}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-btn').textContent=dark?'🌙':'☀️';
  try{localStorage.setItem('gvlr_theme',dark?'dark':'light');}catch(e){}
}
applyTheme();
document.getElementById('theme-btn').addEventListener('click',()=>{dark=!dark;applyTheme();});

document.getElementById('reset-btn').addEventListener('click',()=>document.getElementById('modal').classList.add('open'));
document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');});
document.getElementById('modal-confirm').addEventListener('click',()=>{
  let maxO=tasks.filter(t=>t.status==='active').reduce((m,t)=>Math.max(m,t.order||0),-1);
  tasks.filter(t=>t.status!=='active').forEach(t=>{t.status='active';t.order=t.fixedOrder!=null?t.fixedOrder:++maxO;});
  saveTasks();
  document.getElementById('modal').classList.remove('open');
  currentTab='active';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-tab="active"]').classList.add('active');
  render();showToast('🔄 Tüm görevler aktife alındı');
});

function loadTasks(){
  try{const r=localStorage.getItem(TASKS_KEY);if(r)tasks=JSON.parse(r);}catch(e){}
  if(!tasks.length){
    tasks=[
      {id:1,text:'Dişlerini Fırçala',date:'Bugün',status:'active',order:0,fixedOrder:0},
      {id:2,text:'İlacını al',date:'Bugün',status:'active',order:1,fixedOrder:1},
      {id:3,text:'Dişlerini Fırçala',date:'Bugün',status:'active',order:2,fixedOrder:2},
      {id:4,text:'Ayakkabılarını sil',date:'Bugün',status:'active',order:3,fixedOrder:3},
      {id:5,text:'Traş ol',date:'Bugün',status:'active',order:4,fixedOrder:4},
      {id:6,text:'Krem sür',date:'Bugün',status:'active',order:5,fixedOrder:5},
      {id:7,text:'Burnuna sprey sık',date:'Bugün',status:'active',order:6,fixedOrder:6},
    ];
    saveTasks();
  }
}
function saveTasks(){try{localStorage.setItem(TASKS_KEY,JSON.stringify(tasks));}catch(e){}}
function updateCounts(){
  document.getElementById('cnt-active').textContent=tasks.filter(t=>t.status==='active').length;
  document.getElementById('cnt-done').textContent=tasks.filter(t=>t.status==='done').length;
  document.getElementById('cnt-cancelled').textContent=tasks.filter(t=>t.status==='cancelled').length;
  document.getElementById('subtitle').textContent=tasks.filter(t=>t.status==='active').length+' aktif görev';
}

function render(){
  updateCounts();
  const list=document.getElementById('list');
  const filtered=tasks.filter(t=>t.status===currentTab).sort((a,b)=>(a.order||0)-(b.order||0));
  if(!filtered.length){
    const tip=currentTab!=='active'?'<div class="restore-hint">← Sola kaydırarak aktife alabilirsin</div>':'';
    list.innerHTML='<div class="empty">'+(currentTab==='active'?'Tüm görevler tamam 🎉':currentTab==='done'?'Henüz tamamlanan yok':'Henüz iptal edilen yok')+'</div>'+tip;
    return;
  }
  const restoreHint=currentTab!=='active'?'<div class="restore-hint">← Sola kaydırarak aktife alabilirsin</div>':'';
  list.innerHTML=filtered.map((t,i)=>taskHTML(t,i+1)).join('')+restoreHint;
  if(currentTab==='active'){attachSwipe();attachDrag();attachEditAndDelete();}
  else{attachRestoreSwipe();}
}

function taskHTML(t, num){
  const done=t.status==='done',cancelled=t.status==='cancelled',active=t.status==='active';
  let cc='',ci='';
  if(done){cc='done';ci='✓';}else if(cancelled){cc='cancelled';ci='✕';}
  const handle=active?`<div class="drag-handle" data-id="${t.id}"><span></span><span></span><span></span></div>`:'';
  const delBtn=active?`<button class="del-btn" data-id="${t.id}">✕</button>`:'';
  const numBadge=`<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);min-width:16px;text-align:right;flex-shrink:0">${t.fixedOrder!=null?t.fixedOrder+1:num}</span>`;

  const hints=active
    ?`<div class="hint-bg hint-done"><span class="hint-icon">✓</span></div>
      <div class="hint-bg hint-cancel"><span class="hint-icon">✕</span></div>`
    :`<div class="hint-bg hint-restore"><span class="hint-icon">↩</span></div>`;

  return `<div class="item-wrap" id="wrap-${t.id}" data-id="${t.id}">
    ${hints}
    <div class="item" id="item-${t.id}">
      ${handle}
      ${numBadge}
      <div class="check-circle ${cc}">${ci}</div>
      <div class="item-body">
        <div class="item-text ${done||cancelled?'crossed':''}" id="txt-${t.id}"
          ${active?'contenteditable="false"':''} data-id="${t.id}">${t.text}</div>
        <div class="item-date">${t.date||''}</div>
      </div>
      ${delBtn}
    </div>
  </div>`;
}

/* EDIT */
function attachEditAndDelete(){
  document.querySelectorAll('.item-text[contenteditable]').forEach(el=>{
    let lastTap=0;
    el.addEventListener('touchend',e=>{
      const now=Date.now();
      if(now-lastTap<350){e.preventDefault();startEdit(el);}
      lastTap=now;
    });
    el.addEventListener('dblclick',()=>startEdit(el));
  });
  document.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();deleteTask(+btn.dataset.id);});
    btn.addEventListener('touchend',e=>{e.stopPropagation();deleteTask(+btn.dataset.id);});
  });
  document.querySelectorAll('#list .check-circle').forEach(circle=>{
    const id=+circle.closest('[data-id]').dataset.id;
    circle.style.cursor='pointer';
    circle.addEventListener('click',e=>{e.stopPropagation();flyOut(id,'done');});
  });
}

function startEdit(el){
  el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function finish(){
    el.contentEditable='false';
    const newText=el.textContent.trim();
    const id=+el.dataset.id;
    const task=tasks.find(t=>t.id===id);
    if(task){if(newText)task.text=newText;else el.textContent=task.text;saveTasks();}
    el.removeEventListener('blur',finish);el.removeEventListener('keydown',onKey);
  }
  function onKey(e){
    if(e.key==='Enter'){e.preventDefault();el.blur();}
    if(e.key==='Escape'){el.textContent=tasks.find(t=>t.id===+el.dataset.id)?.text||'';el.blur();}
  }
  el.addEventListener('blur',finish);el.addEventListener('keydown',onKey);
}

function deleteTask(id){
  const wrap=document.getElementById('wrap-'+id);
  const item=document.getElementById('item-'+id);
  if(!wrap||!item)return;
  item.style.transition='opacity 0.2s';item.style.opacity='0';
  wrap.style.transition='max-height 0.25s 0.15s,margin-bottom 0.25s 0.15s';
  wrap.style.maxHeight=wrap.offsetHeight+'px';wrap.style.overflow='hidden';
  setTimeout(()=>{wrap.style.maxHeight='0';wrap.style.marginBottom='0';},50);
  setTimeout(()=>{tasks=tasks.filter(t=>t.id!==id);saveTasks();render();showToast('🗑️ Görev silindi');},380);
}

/* SWIPE active */
function attachSwipe(){
  tasks.filter(t=>t.status==='active').forEach(t=>{
    const el=document.getElementById('item-'+t.id);
    const wrap=document.getElementById('wrap-'+t.id);
    if(!el)return;
    const doneH=wrap.querySelector('.hint-done');
    const cancelH=wrap.querySelector('.hint-cancel');
    let sx=0,sy=0,cx=0,on=false,locked=false;
    function start(x,y){
      if(document.getElementById('txt-'+t.id)?.contentEditable==='true')return;
      sx=x;sy=y;cx=0;on=true;locked=false;el.style.transition='none';
    }
    function move(x,y){
      if(!on)return;
      const dx=x-sx,dy=y-sy;
      if(!locked){if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>8){on=false;return;}if(Math.abs(dx)>8)locked=true;else return;}
      cx=dx;el.style.transform=`translateX(${dx}px)`;
      const r=Math.min(1,Math.abs(dx)/90);
      if(dx>0){if(doneH)doneH.style.opacity=r;if(cancelH)cancelH.style.opacity=0;}
      else{if(cancelH)cancelH.style.opacity=r;if(doneH)doneH.style.opacity=0;}
    }
    function end(){
      if(!on&&!locked)return;on=false;
      if(cx>100)flyOut(t.id,'done');
      else if(cx<-100)flyOut(t.id,'cancelled');
      else{
        el.style.transition='transform 0.25s cubic-bezier(0.4,0,0.2,1)';el.style.transform='translateX(0)';
        if(doneH)doneH.style.opacity=0;if(cancelH)cancelH.style.opacity=0;
      }
    }
    el.addEventListener('touchstart',e=>{if(e.target.closest('.drag-handle')||e.target.closest('.del-btn'))return;const tt=e.touches[0];start(tt.clientX,tt.clientY);},{passive:true});
    el.addEventListener('touchmove',e=>{if(!on)return;const tt=e.touches[0];move(tt.clientX,tt.clientY);},{passive:true});
    el.addEventListener('touchend',end);
  });
}

/* RESTORE SWIPE done/cancelled → active (sola kaydır) */
function attachRestoreSwipe(){
  tasks.filter(t=>t.status===currentTab).forEach(t=>{
    const el=document.getElementById('item-'+t.id);
    const wrap=document.getElementById('wrap-'+t.id);
    if(!el)return;
    const hintEl=wrap.querySelector('.hint-bg');
    let sx=0,sy=0,cx=0,on=false,locked=false;
    function start(x,y){sx=x;sy=y;cx=0;on=true;locked=false;el.style.transition='none';}
    function move(x,y){
      if(!on)return;
      const dx=x-sx,dy=y-sy;
      if(!locked){if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>8){on=false;return;}if(Math.abs(dx)>8)locked=true;else return;}
      if(dx>0){cx=0;el.style.transform='translateX(0)';if(hintEl)hintEl.style.opacity=0;return;}
      cx=dx;el.style.transform=`translateX(${dx}px)`;
      if(hintEl)hintEl.style.opacity=Math.min(1,Math.abs(dx)/90);
    }
    function end(){
      if(!on&&!locked)return;on=false;
      if(cx<-100)restoreTask(t.id);
      else{
        el.style.transition='transform 0.25s cubic-bezier(0.4,0,0.2,1)';el.style.transform='translateX(0)';
        if(hintEl)hintEl.style.opacity=0;
      }
    }
    el.addEventListener('touchstart',e=>{const tt=e.touches[0];start(tt.clientX,tt.clientY);},{passive:true});
    el.addEventListener('touchmove',e=>{if(!on)return;const tt=e.touches[0];move(tt.clientX,tt.clientY);},{passive:true});
    el.addEventListener('touchend',end);
  });
}

function restoreTask(id){
  const el=document.getElementById('item-'+id);
  const wrap=document.getElementById('wrap-'+id);
  if(!el||!wrap)return;
  playRestore();
  el.style.transition='transform 0.32s cubic-bezier(0.4,0,0.2,1),opacity 0.32s';
  el.style.transform='translateX(-450px)';el.style.opacity='0';
  wrap.style.transition='max-height 0.3s 0.28s,margin-bottom 0.3s 0.28s';
  wrap.style.maxHeight=wrap.offsetHeight+'px';wrap.style.overflow='hidden';
  setTimeout(()=>{wrap.style.maxHeight='0';wrap.style.marginBottom='0';},50);
  setTimeout(()=>{
    const task=tasks.find(t=>t.id===id);
    if(task){
      task.status='active';
      task.order=task.fixedOrder!=null?task.fixedOrder:tasks.filter(t=>t.status==='active').reduce((m,t)=>Math.max(m,t.order||0),-1)+1;
      saveTasks();
    }
    render();showToast('↩ Aktife alındı');
  },620);
}

function flyOut(id,newStatus){
  const el=document.getElementById('item-'+id);
  const wrap=document.getElementById('wrap-'+id);
  if(!el||!wrap)return;
  if(newStatus==='done'){playDone();showToast('✓ Tamamlandı');}
  else{playCancel();showToast('✕ İptal edildi');}
  const dir=newStatus==='done'?1:-1;
  el.style.transition='transform 0.32s cubic-bezier(0.4,0,0.2,1),opacity 0.32s';
  el.style.transform=`translateX(${dir*450}px)`;el.style.opacity='0';
  wrap.style.transition='max-height 0.3s 0.28s,margin-bottom 0.3s 0.28s';
  wrap.style.maxHeight=wrap.offsetHeight+'px';wrap.style.overflow='hidden';
  setTimeout(()=>{wrap.style.maxHeight='0';wrap.style.marginBottom='0';},50);
  setTimeout(()=>{const task=tasks.find(t=>t.id===id);if(task){task.status=newStatus;saveTasks();}render();},620);
}

/* DRAG */
let ghost=null,dragId=null,dropTargetId=null,dropPos=null;
function clearDrop(){document.querySelectorAll('.item-wrap').forEach(w=>{w.classList.remove('drop-before','drop-after');});}

function attachDrag(){
  document.querySelectorAll('.drag-handle').forEach(h=>{
    h.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY,+h.dataset.id);},{passive:false});
    h.addEventListener('mousedown',e=>{e.stopPropagation();startDrag(e.clientX,e.clientY,+h.dataset.id);});
  });
}

function startDrag(cx,cy,id){
  dragId=id;
  const item=document.getElementById('item-'+id);if(!item)return;
  const rect=item.getBoundingClientRect();
  ghost=item.cloneNode(true);ghost.classList.add('ghost-item');
  ghost.style.width=rect.width+'px';ghost.style.left=rect.left+'px';ghost.style.top=rect.top+'px';
  document.body.appendChild(ghost);item.classList.add('dragging-item');
  const oy=cy-rect.top,ox=cx-rect.left;

  function moveAt(x,y){
    ghost.style.left=(x-ox)+'px';ghost.style.top=(y-oy)+'px';
    clearDrop();dropTargetId=null;dropPos=null;
    document.querySelectorAll('.item-wrap[data-id]').forEach(w=>{
      if(+w.dataset.id===dragId)return;
      const r=w.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom){
        dropTargetId=+w.dataset.id;dropPos=y<r.top+r.height/2?'before':'after';
        w.classList.add(dropPos==='before'?'drop-before':'drop-after');
      }
    });
  }
  function endDrag(){
    if(ghost){ghost.remove();ghost=null;}
    const i2=document.getElementById('item-'+dragId);if(i2)i2.classList.remove('dragging-item');
    clearDrop();
    if(dropTargetId&&dropTargetId!==dragId){
      const fresh=tasks.filter(t=>t.status==='active').sort((a,b)=>(a.order||0)-(b.order||0));
      const fi=fresh.findIndex(t=>t.id===dragId);
      let ti=fresh.findIndex(t=>t.id===dropTargetId);
      if(fi>-1&&ti>-1){
        const[m]=fresh.splice(fi,1);
        if(dropPos==='after')ti=ti+(fi<ti?0:1);else if(fi<ti)ti--;
        fresh.splice(ti,0,m);
        fresh.forEach((t,i)=>{const tk=tasks.find(x=>x.id===t.id);if(tk){tk.order=i;tk.fixedOrder=i;}});
        saveTasks();
      }
    }
    dragId=null;dropTargetId=null;dropPos=null;render();
    window.removeEventListener('touchmove',onTM);window.removeEventListener('touchend',onTE);
    window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);
  }
  function onTM(e){moveAt(e.touches[0].clientX,e.touches[0].clientY);}
  function onTE(){endDrag();}
  function onMM(e){moveAt(e.clientX,e.clientY);}
  function onMU(){endDrag();}
  window.addEventListener('touchmove',onTM,{passive:true});window.addEventListener('touchend',onTE);
  window.addEventListener('mousemove',onMM);window.addEventListener('mouseup',onMU);
}

/* ADD */
document.getElementById('add-btn').addEventListener('click',addTask);
document.getElementById('new-task').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function addTask(){
  const inp=document.getElementById('new-task');
  const text=inp.value.trim();if(!text)return;
  const maxO=tasks.filter(t=>t.status==='active').reduce((m,t)=>Math.max(m,t.order||0),-1);
  tasks.unshift({id:Date.now(),text,date:'Bugün',status:'active',order:maxO+1,fixedOrder:maxO+1});
  saveTasks();inp.value='';
  if(currentTab!=='active'){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('[data-tab="active"]').classList.add('active');
    currentTab='active';
  }
  render();
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');currentTab=tab.dataset.tab;render();
  });
});

loadTasks();render();
